<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocole de réconciliation des mémoires collectives</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:580px;margin:0 auto}
.title{font-size:14px;font-weight:500;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:1.5rem}
.phases{display:flex;align-items:center;gap:6px;margin-bottom:2rem}
.ph{width:7px;height:7px;border-radius:50%;background:#ddd;transition:all .3s}
.ph.on{background:#555;transform:scale(1.3)}
.ph.ok{background:#aaa}
.ph-lbl{font-size:11px;color:#aaa;margin-left:8px;letter-spacing:.06em;text-transform:uppercase}
.card{border:0.5px solid #e0ddd6;border-radius:12px;padding:1.5rem;margin-bottom:1rem;background:#fff}
.q{font-size:16px;color:#1a1a1a;line-height:1.75;margin-bottom:1rem;font-weight:400}
.hint{font-size:13px;color:#666;line-height:1.65;border-left:2px solid #e0ddd6;padding-left:12px;margin-bottom:1rem}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;background:#f4f3f0;border:0.5px solid #e0ddd6;border-radius:99px;padding:3px 10px;margin-bottom:.75rem}
textarea{width:100%;min-height:90px;resize:vertical;font-size:14px;padding:10px 12px;border-radius:8px;border:0.5px solid #ccc;background:#f8f7f4;color:#1a1a1a;font-family:inherit;line-height:1.6;margin-top:.5rem}
textarea:focus{outline:none;border-color:#888}
.row{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;align-items:center}
button{font-size:13px;padding:7px 14px;border-radius:8px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:background .15s}
button:hover{background:#f0efe9}
button:active{transform:scale(.98)}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-p:hover{opacity:.85;background:#1a1a1a}
.btn-s{font-size:12px;padding:5px 10px;color:#888;border-color:#e0ddd6}
.qk{display:flex;flex-wrap:wrap;gap:5px;margin-top:.5rem}
.qk button{font-size:12px;padding:4px 10px;color:#888;border-color:#e0ddd6}
.hist{margin-bottom:1.5rem}
.hi{padding:9px 0;border-bottom:0.5px solid #e0ddd6}
.hi:last-child{border-bottom:none}
.hiq{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.hia{font-size:14px;color:#666;line-height:1.5}
.ok-banner{border:0.5px solid #a8d5b5;background:#f0faf3;color:#2d7a4a;border-radius:8px;padding:.75rem 1rem;font-size:14px;margin-bottom:1rem;line-height:1.6}
.nav-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.sep{height:0.5px;background:#e0ddd6;margin:1rem 0}
.err{border-color:#e24b4a !important}
</style>
</head>
<body>
<div class="wrap">
<div class="title">Mémoires collectives — protocole de réconciliation</div>
<div class="phases">
  <div class="ph on" id="p0"></div>
  <div class="ph" id="p1"></div>
  <div class="ph" id="p2"></div>
  <div class="ph" id="p3"></div>
  <div class="ph" id="p4"></div>
  <div class="ph" id="p5"></div>
  <span class="ph-lbl" id="plbl">Introduction</span>
</div>
<div id="navBar" class="nav-bar" style="display:none"></div>
<div id="main"></div>
<div id="histWrap" style="display:none"><div class="sep"></div><div class="hist" id="hist"></div></div>
</div>

<script>
const LABELS=['Introduction','Groupe','Événement','Détail & témoins','Justifications','Antérieur'];
const S={
  phase:'intro',group:'',events:[],
  cur:{when:'',what:'',detail:'',witnesses:[],curWitness:'',justifs:[],otherGroups:[],curOther:''},
  hist:[],dotIdx:0,stack:[]
};

function dot(i){
  for(let j=0;j<6;j++){
    const d=document.getElementById('p'+j);
    d.className='ph'+(j<i?' ok':j===i?' on':'');
  }
  document.getElementById('plbl').textContent=LABELS[Math.min(i,5)];
}

function pushHist(q,a){S.hist.push({q,a});}

function renderHist(){
  const w=document.getElementById('histWrap');
  const h=document.getElementById('hist');
  if(!S.hist.length){w.style.display='none';return;}
  w.style.display='block';
  h.innerHTML=S.hist.map(x=>`<div class="hi"><div class="hiq">${x.q}</div><div class="hia">${x.a}</div></div>`).join('');
}

function showNavBar(){
  const nb=document.getElementById('navBar');
  const items=[];
  if(S.stack.length>0) items.push(`<button class="btn-s" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Revenir</button>`);
  items.push(`<button class="btn-s" onclick="doExit()"><i class="ti ti-x" aria-hidden="true"></i> Suspendre</button>`);
  nb.style.display='flex';nb.innerHTML=items.join('');
  window.goBack=()=>{if(S.stack.length>0){S.phase=S.stack.pop();render();}};
  window.doExit=()=>{
    document.getElementById('main').innerHTML=`<div class="card"><p class="q">Session suspendue.</p><p class="hint">Vous pouvez reprendre à tout moment. Votre progression est conservée dans l'historique ci-dessous.</p><div class="row"><button class="btn-p" onclick="doResume()">Reprendre</button></div></div>`;
    document.getElementById('navBar').style.display='none';
  };
  window.doResume=()=>{S.phase=S.stack.length?S.stack[S.stack.length-1]:'event_q';render();};
}

function push(next){S.stack.push(S.phase);S.phase=next;}

function inp(ph,question,hint,onOk,quick=[],skipLbl=''){
  const m=document.getElementById('main');
  const qk=quick.length?`<div class="qk">${quick.map(r=>`<button onclick="qf('${r.replace(/'/g,"\\'")}')">${r}</button>`).join('')}</div>`:'';
  const sk=skipLbl?`<button class="btn-s" onclick="doSkip()">${skipLbl}</button>`:'';
  m.innerHTML=`<div class="card"><p class="q">${question}</p>${hint?`<p class="hint">${hint}</p>`:''}<textarea id="ti" placeholder="Exprimez-vous librement…"></textarea>${qk}<div class="row"><button class="btn-p" onclick="doOk()">Continuer →</button>${sk}</div></div>`;
  dot(ph);showNavBar();renderHist();
  window.doOk=()=>{
    const v=document.getElementById('ti').value.trim();
    if(!v){const t=document.getElementById('ti');t.classList.add('err');setTimeout(()=>t.classList.remove('err'),1500);return;}
    onOk(v);
  };
  window.doSkip=()=>onOk('__skip__');
  window.qf=(t)=>{const ti=document.getElementById('ti');if(ti)ti.value=t;};
}

function btns(ph,question,hint,buttons){
  const m=document.getElementById('main');
  m.innerHTML=`<div class="card"><p class="q">${question}</p>${hint?`<p class="hint">${hint}</p>`:''}<div class="row">${buttons.map(b=>`<button class="${b.p?'btn-p':''}" onclick="${b.fn}()">${b.l}</button>`).join('')}</div></div>`;
  dot(ph);showNavBar();renderHist();
}

function render(){
  const ph=S.phase;

  if(ph==='intro'){
    dot(0);
    document.getElementById('navBar').style.display='none';
    document.getElementById('main').innerHTML=`<div class="card"><p class="q">Bienvenue dans ce protocole d'exploration des mémoires collectives.</p><p class="hint">Nous allons remonter ensemble, événement par événement, les chaînes de justification qui ont conduit aux tensions entre votre groupe et d'autres — du plus récent vers le plus ancien.<br><br>Il n'y a ni accusation, ni culpabilité personnelle. Tous les groupes humains ont commis des actes qu'ils ont ensuite sacralisés. Le but est de comprendre et d'apaiser.</p><div class="row"><button class="btn-p" onclick="startP()">Commencer →</button></div></div>`;
    renderHist();
    window.startP=()=>{push('group');render();};

  }else if(ph==='group'){
    inp(1,'À quel groupe appartenez-vous ?','Communauté religieuse, ethnique, nationale — nommez le groupe dont vous partagez la mémoire collective.',(v)=>{
      S.group=v;pushHist('Votre groupe','→ '+v);push('event_q');render();
    },['Chrétien catholique','Juif','Musulman sunnite','Musulman chiite','Autre']);

  }else if(ph==='event_q'){
    inp(2,`Quel est l'événement — dans la relation entre <em>${S.group}</em> et un autre groupe — qui vous laisse un sentiment de malaise ou de tension non résolue ?`,'Commencez par le plus récent. Nommez simplement ce qui vient spontanément.',(v)=>{
      S.cur={when:'',what:v,detail:'',witnesses:[],curWitness:'',justifs:[],otherGroups:[],curOther:''};
      pushHist('Événement','→ '+v);push('when');render();
    });

  }else if(ph==='when'){
    inp(2,'Quand cela s\'est-il produit ?','',(v)=>{
      S.cur.when=v;pushHist('Quand','→ '+v);push('what_detail');render();
    },['Récemment (2000–aujourd\'hui)','XXe siècle','Époque médiévale','Origines (avant XIe s.)']);

  }else if(ph==='what_detail'){
    const m=document.getElementById('main');
    m.innerHTML=`<div class="card"><div class="tag"><i class="ti ti-clock" aria-hidden="true"></i>${S.cur.when}</div><p class="q">Qu'est-ce qui s'est exactement passé ? Qui étaient les acteurs, qui a pris les décisions ?</p><p class="hint">Exprimez ce que vous savez. Vous pouvez aussi demander un complément historique factuel.</p><textarea id="ti" placeholder="Décrivez les faits…"></textarea><div class="row"><button class="btn-p" onclick="doOk()">Continuer →</button><button class="btn-s" onclick="doComp()">Compléter par l'histoire →</button></div></div>`;
    dot(2);showNavBar();renderHist();
    window.doOk=()=>{
      const v=document.getElementById('ti').value.trim();
      if(!v){const t=document.getElementById('ti');t.classList.add('err');setTimeout(()=>t.classList.remove('err'),1500);return;}
      S.cur.detail=v;pushHist('Ce qui s\'est passé','→ '+v.substring(0,100)+(v.length>100?'…':''));
      push('witness_q');render();
    };
    window.doComp=()=>{
      const v=document.getElementById('ti').value.trim();
      if(v)S.cur.detail=v;
      alert(`Pour obtenir un complément historique, posez cette question dans votre IA :\n\n"Décris factuellement l'événement suivant pour le groupe ${S.group} : ${S.cur.what} (${S.cur.when}). Acteurs principaux, groupes impliqués, décisions, conséquences immédiates. Ton sobre, sans jugement moral."`);
    };

  }else if(ph==='witness_q'){
    inp(3,'Qui étaient les témoins ou observateurs dont la présence était gênante pour les auteurs de ces faits ?','Ce sont souvent ceux dont le simple regard rappelait l\'erreur commise — et que l\'on a commencé à rejeter pour cette raison.',(v)=>{
      if(v==='__skip__'){push('justif_q');render();return;}
      S.cur.curWitness=v;pushHist('Témoin gênant','→ '+v);push('witness_why');render();
    },[],'Aucun témoin identifié → passer');

  }else if(ph==='witness_why'){
    inp(3,`En quoi <em>${S.cur.curWitness}</em> était-il particulièrement gênant ?`,'Qu\'est-ce que leur présence, leur regard ou leur simple existence rappelait aux auteurs des faits ?',(v)=>{
      S.cur.witnesses.push({who:S.cur.curWitness,why:v});
      pushHist('Pourquoi gênant','→ '+v.substring(0,80)+(v.length>80?'…':''));
      push('witness_more');render();
    });

  }else if(ph==='witness_more'){
    btns(3,'Y a-t-il d\'autres témoins ou groupes dont la présence était gênante ?','',[
      {l:'Oui, en nommer un autre',fn:'addWit',p:false},
      {l:'Passer aux justifications →',fn:'goJustif',p:true},
    ]);
    window.addWit=()=>{push('witness_q');render();};
    window.goJustif=()=>{push('justif_q');render();};

  }else if(ph==='justif_q'){
    const wits=S.cur.witnesses.map(w=>w.who).join(', ');
    inp(4,'Quelles justifications ont été avancées pour cet événement ?',`Justifications vis-à-vis de soi-même${wits?` et des témoins (${wits})`:''}. Sincères ou prétextes — toute justification avait une part de vérité <em>pour celui qui la formulait au moment où il la pensait</em>.`,(v)=>{
      if(v==='__skip__'){
        alert(`Demandez à votre IA :\n\n"Quelles sont les principales justifications historiques avancées par le groupe ${S.group} pour l'événement : ${S.cur.what} ? Distingue justifications sincères et prétextes rétrospectifs si possible. Ton factuel, sans jugement."`);
        return;
      }
      S.cur.justifs.push(v);pushHist('Justifications','→ '+v.substring(0,100)+(v.length>100?'…':''));
      push('other_group_q');render();
    },[],'Je ne sais pas → demander à l\'IA →');

  }else if(ph==='other_group_q'){
    inp(4,'Y a-t-il d\'autres groupes ou individus dont la présence ou le regard suscitait un rejet similaire ?','Nous explorerons les justifications correspondantes pour chacun.',(v)=>{
      if(v==='__skip__'){push('relief_check');render();return;}
      S.cur.curOther=v;pushHist('Autre groupe','→ '+v);push('other_justif');render();
    },[],'Aucun autre → vérifier le soulagement');

  }else if(ph==='other_justif'){
    inp(4,`Quelles justifications étaient opposées à <em>${S.cur.curOther}</em> — en soi-même ou ouvertement ?`,'Sincères ou prétextes, elles avaient leur logique propre au moment où elles ont été formulées.',(v)=>{
      S.cur.otherGroups.push({who:S.cur.curOther,justif:v});
      pushHist('Justif. / '+S.cur.curOther,'→ '+v.substring(0,80)+(v.length>80?'…':''));
      push('other_group_q');render();
    });

  }else if(ph==='relief_check'){
    btns(5,'En ayant exploré cet événement — les faits, les témoins, les justifications — ressentez-vous un certain soulagement, une légèreté ?','',[
      {l:'Oui, je me sens plus léger',fn:'goRelief',p:true},
      {l:'Partiellement',fn:'goPrior',p:false},
      {l:'Pas encore',fn:'goPrior',p:false},
    ]);
    window.goRelief=()=>{push('relief');render();};
    window.goPrior=()=>{push('prior_q');render();};

  }else if(ph==='relief'){
    dot(5);showNavBar();
    document.getElementById('main').innerHTML=`<div class="ok-banner"><i class="ti ti-check" aria-hidden="true"></i> Ce sujet semble apaisé. Nous pouvons y revenir à tout moment si vous le souhaitez.</div><div class="card"><p class="q">Souhaitez-vous explorer un événement antérieur — plus ancien dans la mémoire de votre groupe ?</p><div class="row"><button class="btn-p" onclick="goPriorR()">Remonter plus loin →</button><button onclick="goEnd()">Non, c'est suffisant</button></div></div>`;
    renderHist();
    window.goPriorR=()=>{push('prior_q');render();};
    window.goEnd=()=>{push('end');render();};

  }else if(ph==='prior_q'){
    S.events.push({...S.cur});
    inp(5,'Quel événement antérieur — plus ancien — pourrait être lié aux mêmes tensions ?','Si rien ne vient spontanément, l\'IA peut vous proposer des événements historiques pertinents pour votre groupe.',(v)=>{
      if(v==='__skip__'){
        const evts=S.events.map(e=>e.what).join(', ');
        alert(`Demandez à votre IA :\n\n"Pour le groupe ${S.group}, propose 2 ou 3 événements historiques antérieurs à ceux-ci : ${evts}. Liés aux mêmes tensions. Datés et décrits sobrement en 2-3 lignes chacun."`);
        return;
      }
      S.cur={when:'',what:v,detail:'',witnesses:[],curWitness:'',justifs:[],otherGroups:[],curOther:''};
      pushHist('Événement antérieur','→ '+v);push('when');render();
    },[],'Aucune idée → demander à l\'IA →');

  }else if(ph==='end'){
    dot(5);
    document.getElementById('navBar').style.display='none';
    document.getElementById('main').innerHTML=`<div class="ok-banner"><i class="ti ti-check" aria-hidden="true"></i> Merci pour ce parcours. Les événements explorés restent visibles dans l'historique ci-dessous.</div><div class="card"><p class="q">Lors d'une prochaine session, vous pourrez vérifier si la perception des groupes antagonistes a évolué, et reprendre l'exploration là où elle s'est arrêtée.</p><div class="row"><button class="btn-p" onclick="newEvt()">Explorer un autre événement →</button></div></div>`;
    renderHist();
    window.newEvt=()=>{push('event_q');render();};
  }

  renderHist();
}

render();
</script>
</body>
</html>
